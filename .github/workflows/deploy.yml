# GitHub Actions — Kompozit CI/CD
# Triggers on push to main branch
# Builds frontend + admin_panel + backend
# Deploys via SSH to same VPS as Ensotek
#
# Required GitHub Secrets:
#   VPS_HOST       — server IP
#   VPS_USER       — SSH user
#   VPS_KEY        — private SSH key (ed25519)

name: Deploy Kompozit

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-kompozit
  cancel-in-progress: true

env:
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install & build kompozit_backend
        working-directory: backend
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile || bun install

      - name: Type Check
        working-directory: frontend
        run: bun run type-check

      - name: Build
        working-directory: frontend
        run: bun run build

      - name: Smoke tests (home, offline — no API)
        working-directory: frontend
        run: |
          bun run test:smoke:home-content:offline
          bun run test:smoke:home-api:offline

      - name: Install & build kompozit_admin_panel
        working-directory: admin_panel
        run: |
          bun install --frozen-lockfile || bun install
          bun run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: kompozit-backend-dist
          path: |
            backend/dist/
            backend/package.json
            backend/ecosystem.config.cjs
          retention-days: 1

      - name: Upload karbonkompozit artifact
        uses: actions/upload-artifact@v4
        with:
          name: kompozit-frontend-dist
          path: |
            frontend/.next/standalone/
            frontend/.next/static/
            frontend/public/
            frontend/package.json
            frontend/ecosystem.config.cjs
            frontend/Dockerfile
          retention-days: 1

      - name: Upload admin panel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kompozit-admin-dist
          path: |
            admin_panel/.next/standalone/
            admin_panel/.next/static/
            admin_panel/public/
            admin_panel/package.json
            admin_panel/ecosystem.config.cjs
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure deploy directories exist
        env:
          SSH: ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
        run: |
          $SSH "mkdir -p /var/www/Ensotek/kompozit_backend /var/www/Ensotek/karbonkompozit /var/www/Ensotek/kompozit_admin_panel"

      - name: Deploy kompozit_backend
        env:
          SSH: ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}
          RSYNC_SSH: ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/deploy_key
        run: |
          rsync -avz --delete \
            --exclude=node_modules --exclude=.env \
            -e "$RSYNC_SSH" \
            kompozit-backend-dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/Ensotek/kompozit_backend/

          $SSH "cd /var/www/Ensotek/kompozit_backend && bun install --production --frozen-lockfile || bun install --production"

      - name: Deploy karbonkompozit
        env:
          RSYNC_SSH: ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/deploy_key
        run: |
          rsync -avz --delete \
            --exclude=node_modules --exclude=.env \
            -e "$RSYNC_SSH" \
            kompozit-frontend-dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/Ensotek/karbonkompozit/

      - name: Deploy kompozit_admin_panel
        env:
          RSYNC_SSH: ssh -o ConnectTimeout=30 -o ServerAliveInterval=15 -i ~/.ssh/deploy_key
        run: |
          rsync -avz --delete \
            --exclude=node_modules --exclude=.env \
            -e "$RSYNC_SSH" \
            kompozit-admin-dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/Ensotek/kompozit_admin_panel/

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          timeout: 60s
          command_timeout: 180s
          script: |
            set -e

            echo "=== Kompozit Backend ==="
            cd /var/www/Ensotek/kompozit_backend
            if pm2 describe kompozit-backend > /dev/null 2>&1; then
              pm2 restart kompozit-backend
            else
              pm2 start ecosystem.config.cjs
            fi

            echo "=== Karbonkompozit Frontend ==="
            cd /var/www/Ensotek/karbonkompozit
            if pm2 describe karbonkompozit > /dev/null 2>&1; then
              pm2 restart karbonkompozit
            else
              pm2 start ecosystem.config.cjs
            fi

            echo "=== Kompozit Admin Panel ==="
            cd /var/www/Ensotek/kompozit_admin_panel
            if pm2 describe kompozit-admin-panel > /dev/null 2>&1; then
              pm2 restart kompozit-admin-panel
            else
              pm2 start ecosystem.config.cjs
            fi

            pm2 save
            echo "=== Health check ==="
            sleep 3
            ss -ltnp | grep -E "127\.0\.0\.1:(8186|3020|3004)" || true
